# Zeus message presets
# quick.1–quick.4: Alt+1–Alt+4 buttons in Message dialog (m key)
# [[premade]]: Ctrl+G preset message templates

[quick.1]
name = "Research"
text = """
Read this target files/folders in depth. Deeply understand how it all works: \
architecture, design, algorithmic decisions, what it solves, how and why. \
Learn specific details. Identify unique aspects that deviate from typical \
designs or assumptions. Understand it deeply and look for potential bugs.

Then write a detailed and structured report of your learnings and findings \
in work/RESEARCH-<timestamp>.md

- Target: <FILL>
- Research focus: <FILL>"""

[quick.2]
name = "Plan"
text = """\
I want to build the feature described below. Write a detailed \
work/PLAN-<timestamp>.md document outlining how to implement this. \
The document should be detailed, but written in a succinct and to-the-point \
way, with no fluff, fat, boilerplate or low-value information. High \
signal-to-noise is extremely important.

The document should be structured like this:

- Summary of feature
- Overview of the steps
- Details of execution. Include when relevant:
  - Code snippets of the most important key changes
  - Invariants that will be maintained: what the change will make sure to not break
  - Traps: if there is something predictable that could stop your progress and should be addressed beforehand.

Feature:"""

[quick.3]
name = "Iterate"
text = """\
Now we are in the iteration phase. At every iteration I choose between:

- A (repeat): I added a few notes to the document. Address all the notes and \
update the document and your understanding accordingly. Don't implement yet.
- B (finalize): Add a detailed todo list to the plan in work/TODO-<timestamp>, \
with all the phases and individual tasks necessary to complete the plan. Don't \
implement yet, wait for my signal.

I now choose """

[quick.4]
name = "Build"
text = "Stub text for Build preset."


[[premade]]
name = "Self-review"
text = "Review your output against your own claims again"
